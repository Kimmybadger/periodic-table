<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주기율표 — Interactive Periodic Table</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --border: #1e2d3d;
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #38bdf8;
    --glow: rgba(56,189,248,0.15);

    --alkali: #ef4444;
    --alkaline: #f97316;
    --transition: #eab308;
    --posttrans: #84cc16;
    --metalloid: #22c55e;
    --nonmetal: #06b6d4;
    --halogen: #818cf8;
    --noble: #c084fc;
    --lanthanide: #f472b6;
    --actinide: #fb7185;
    --unknown: #475569;

    /* 셀 크기 — 이 변수 하나로 전체 테이블 스케일 결정 */
    --cell: 100px;
    --label: 40px;
    --gap: 5px;
    --sym-size: 2.1rem;
    --num-size: 0.82rem;
    --name-size: 0.72rem;
    --mass-size: 0.64rem;
  }

  /* 모바일: 작게 */
  @media (max-width: 900px) {
    :root {
      --cell: 46px;
      --label: 22px;
      --gap: 3px;
      --sym-size: 0.95rem;
      --num-size: 0.5rem;
      --name-size: 0.4rem;
      --mass-size: 0.38rem;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: auto;
    scroll-behavior: smooth;
  }

  header {
    padding: 20px 30px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    min-width: max-content;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.65rem;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: border-color 0.15s, color 0.15s;
    user-select: none;
    -webkit-user-select: none;
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .main-container {
    padding: 16px 20px 30px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: max-content;
    min-width: 100%;
  }

  /* Period/Group info bar */
  .info-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: max-content;
    min-width: min(100%, 960px);
  }

  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.75rem;
    color: var(--muted);
    min-height: 60px;
    transition: border-color 0.3s;
  }

  .info-card.active {
    border-color: var(--accent);
    color: var(--text);
  }

  .info-card .label {
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    font-size: 0.65rem;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  /* Table grid */
  .table-wrapper {
    padding-right: 20px;
  }

  .pt-grid {
    display: grid;
    grid-template-columns: var(--label) repeat(18, var(--cell));
    grid-template-rows: var(--label) repeat(7, var(--cell)) 14px repeat(2, var(--cell));
    gap: var(--gap);
    width: max-content;
  }

  .period-label, .group-label {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: var(--num-size);
    color: var(--muted);
    cursor: default;
  }

  .group-label {
    flex-direction: column;
    gap: 1px;
  }

  .group-label span { font-size: calc(var(--num-size) * 0.8); color: #334155; }

  /* Element cells */
  .el {
    border-radius: 5px;
    padding: 3px 4px;
    cursor: pointer;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border: 1px solid transparent;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    background: var(--surface);
  }

  .el:hover {
    transform: scale(1.18);
    z-index: 10;
    box-shadow: 0 0 16px var(--glow), 0 4px 20px rgba(0,0,0,0.5);
    border-color: var(--accent);
  }

  .el.highlighted {
    border-color: rgba(56,189,248,0.6);
    box-shadow: 0 0 10px var(--glow);
  }

  .el-num {
    font-size: var(--num-size);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    line-height: 1;
  }

  .el-sym {
    font-size: var(--sym-size);
    font-weight: 700;
    line-height: 1;
    text-align: center;
    font-family: 'Space Mono', monospace;
  }

  .el-name {
    font-size: var(--name-size);
    text-align: center;
    color: #94a3b8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }

  .el-mass {
    font-size: var(--mass-size);
    color: #475569;
    text-align: center;
    font-family: 'Space Mono', monospace;
    line-height: 1;
  }

  /* Category colors */
  .cat-alkali .el-sym { color: var(--alkali); }
  .cat-alkali { border-left: 2px solid var(--alkali); }
  .cat-alkaline .el-sym { color: var(--alkaline); }
  .cat-alkaline { border-left: 2px solid var(--alkaline); }
  .cat-transition .el-sym { color: var(--transition); }
  .cat-transition { border-left: 2px solid var(--transition); }
  .cat-posttrans .el-sym { color: var(--posttrans); }
  .cat-posttrans { border-left: 2px solid var(--posttrans); }
  .cat-metalloid .el-sym { color: var(--metalloid); }
  .cat-metalloid { border-left: 2px solid var(--metalloid); }
  .cat-nonmetal .el-sym { color: var(--nonmetal); }
  .cat-nonmetal { border-left: 2px solid var(--nonmetal); }
  .cat-halogen .el-sym { color: var(--halogen); }
  .cat-halogen { border-left: 2px solid var(--halogen); }
  .cat-noble .el-sym { color: var(--noble); }
  .cat-noble { border-left: 2px solid var(--noble); }
  .cat-lanthanide .el-sym { color: var(--lanthanide); }
  .cat-lanthanide { border-left: 2px solid var(--lanthanide); }
  .cat-actinide .el-sym { color: var(--actinide); }
  .cat-actinide { border-left: 2px solid var(--actinide); }
  .cat-unknown .el-sym { color: var(--unknown); }
  .cat-unknown { border-left: 2px solid var(--unknown); }

  /* La/Ac placeholders */
  .placeholder {
    background: rgba(255,255,255,0.02);
    border-radius: 5px;
    border: 1px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.5rem;
    color: #1e3a4a;
    cursor: default;
  }

  .gap-row { height: 16px; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 560px;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
    animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.85) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }

  .modal-symbol-box {
    width: 80px;
    height: 80px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.04);
    flex-shrink: 0;
  }

  .modal-symbol-box .num { font-size: 0.75rem; font-family: 'Space Mono', monospace; color: var(--muted); }
  .modal-symbol-box .sym { font-size: 2.2rem; font-family: 'Space Mono', monospace; font-weight: 700; line-height: 1; }
  .modal-symbol-box .name-ko { font-size: 0.6rem; color: var(--muted); margin-top: 2px; }

  .modal-title { flex: 1; }
  .modal-title h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
  .modal-title .name-en { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
  .modal-cat-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.65rem;
    font-weight: 600;
    background: rgba(255,255,255,0.06);
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover { border-color: var(--accent); color: var(--accent); }

  .modal-body { padding: 20px 24px; }

  .props-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .prop {
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .prop-label { font-size: 0.6rem; color: var(--muted); margin-bottom: 3px; }
  .prop-value { font-size: 0.85rem; font-weight: 600; font-family: 'Space Mono', monospace; }

  .modal-desc {
    font-size: 0.8rem;
    line-height: 1.7;
    color: #94a3b8;
    margin-bottom: 20px;
  }

  .links {
    display: flex;
    gap: 10px;
  }

  .link-btn {
    flex: 1;
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s;
  }

  .link-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--glow); }
  .link-btn.wiki { border-color: rgba(56,189,248,0.3); }
  .link-btn.namu { border-color: rgba(129,140,248,0.3); }

  /* hover group/period highlight */
  .el.period-hl { background: rgba(56,189,248,0.07); }
  .el.group-hl { background: rgba(56,189,248,0.07); }
</style>
</head>
<body>

<header>
  <div class="logo">⚛ PERIODIC TABLE</div>
  <div class="legend" id="legend"></div>
</header>

<div class="main-container">
  <!-- Info Bar -->
  <div class="info-bar">
    <div class="info-card" id="period-info">
      <div class="label">▶ 주기 (Period / 행)</div>
      <div id="period-text">원소 위에 마우스를 올리면 주기 특징이 표시됩니다.</div>
    </div>
    <div class="info-card" id="group-info">
      <div class="label">▶ 족 (Group / 열)</div>
      <div id="group-text">원소를 클릭하거나 호버하면 족 특징이 표시됩니다.</div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <div class="pt-grid" id="pt-grid"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div class="modal-header">
      <div class="modal-symbol-box" id="m-box">
        <div class="num" id="m-num"></div>
        <div class="sym" id="m-sym"></div>
        <div class="name-ko" id="m-name-ko"></div>
      </div>
      <div class="modal-title">
        <h2 id="m-name"></h2>
        <div class="name-en" id="m-name-en"></div>
        <div class="modal-cat-badge" id="m-cat"></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="props-grid">
        <div class="prop"><div class="prop-label">원자량</div><div class="prop-value" id="m-mass"></div></div>
        <div class="prop"><div class="prop-label">전자 배치</div><div class="prop-value" id="m-config"></div></div>
        <div class="prop"><div class="prop-label">주기 / 족</div><div class="prop-value" id="m-pg"></div></div>
        <div class="prop"><div class="prop-label">상온 상태</div><div class="prop-value" id="m-state"></div></div>
        <div class="prop"><div class="prop-label">발견 연도</div><div class="prop-value" id="m-year"></div></div>
        <div class="prop"><div class="prop-label">전기음성도</div><div class="prop-value" id="m-en"></div></div>
      </div>
      <div class="modal-desc" id="m-desc"></div>
      <div class="links">
        <a class="link-btn wiki" id="m-wiki" href="#" target="_blank">🌐 Wikipedia</a>
        <a class="link-btn namu" id="m-namu" href="#" target="_blank">🌿 나무위키</a>
      </div>
    </div>
  </div>
</div>

<script>
const PERIODS = {
  1: "1주기: 전자 껍질 1개(K껍질). 수소(H)와 헬륨(He)만 존재. 가장 가벼운 원소들로 우주 질량의 대부분을 차지.",
  2: "2주기: 전자 껍질 2개(K,L). Li~Ne. s·p 오비탈만 사용. 유기화학의 핵심 원소(C·N·O·F) 포함. 비교적 작은 원자 반지름.",
  3: "3주기: 전자 껍질 3개(K,L,M). Na~Ar. 3s·3p 오비탈 채움. 금속성과 비금속성의 뚜렷한 대조. Na·Mg는 활성 금속, Cl·Ar은 비금속/비활성.",
  4: "4주기: 처음으로 d 오비탈(3d) 등장 → 전이 금속 10개(Sc~Zn) 포함. Fe·Co·Ni 등 자기적 성질. 총 18개 원소.",
  5: "5주기: 4d 전이 금속(Y~Cd) 포함. Ag(은), Pd, Rh 등 귀금속·촉매 원소. Sn·Te 등 반도체 관련 원소.",
  6: "6주기: 5d 전이 금속과 란타넘족(4f 오비탈). W·Au·Pt·Hg 등 중요 금속. Tl~Pb 등 무거운 전이후 금속 포함. 상대론적 효과 뚜렷.",
  7: "7주기: 6d 전이 금속과 악티늄족(5f 오비탈). 대부분 방사성 원소. U·Pu 등 핵연료. 104번 이후는 초우라늄 인공 원소."
};

const GROUPS = {
  1:  "1족(알칼리 금속): Li·Na·K·Rb·Cs·Fr. 최외각 전자 1개 → 매우 반응성 높음. 물과 반응해 수소 발생. 부드럽고 밀도 낮음.",
  2:  "2족(알칼리 토금속): Be·Mg·Ca·Sr·Ba·Ra. 최외각 전자 2개. 1족보다 단단하고 밀도 높음. Ca·Mg은 생체 필수 원소.",
  3:  "3족: Sc·Y + 란타넘족·악티늄족. d 오비탈 채우기 시작. 다양한 산화 상태.",
  4:  "4족: Ti·Zr·Hf·Rf. Ti는 경량 고강도 구조재. 높은 녹는점.",
  5:  "5족: V·Nb·Ta·Db. V는 촉매·합금강 원료. 내열·내부식성.",
  6:  "6족: Cr·Mo·W·Sg. W는 가장 높은 녹는점(3422°C). Cr은 스테인리스강 핵심.",
  7:  "7족: Mn·Tc·Re·Bh. Mn은 철강 탈산제. Tc는 최초 인공 원소.",
  8:  "8족: Fe·Ru·Os·Hs. Fe는 지각 4번째 풍부 원소. Ru·Os는 귀금속.",
  9:  "9족: Co·Rh·Ir·Mt. Co는 영구자석·배터리. Rh·Ir은 촉매 변환기.",
  10: "10족: Ni·Pd·Pt·Ds. Ni는 합금·도금. Pd·Pt는 수소저장·촉매.",
  11: "11족(주화 금속): Cu·Ag·Au·Rg. 전기·열 전도성 최고. 역사적으로 화폐 금속.",
  12: "12족: Zn·Cd·Hg·Cn. Zn은 도금·효소 보조인자. Hg는 상온 액체 금속.",
  13: "13족(붕소족): B·Al·Ga·In·Tl·Nh. Al은 지각 가장 풍부한 금속. B은 준금속.",
  14: "14족(탄소족): C·Si·Ge·Sn·Pb·Fl. C은 생명의 기반. Si은 반도체 핵심.",
  15: "15족(질소족): N·P·As·Sb·Bi·Mc. N은 대기 78%. P은 DNA·ATP 구성 원소.",
  16: "16족(칼코겐): O·S·Se·Te·Po·Lv. O는 생명 필수. S은 단백질 구조.",
  17: "17족(할로겐): F·Cl·Br·I·At·Ts. 최외각 전자 7개 → 1가 음이온. 강한 산화제. F는 가장 전기음성도 높음.",
  18: "18족(비활성 기체): He·Ne·Ar·Kr·Xe·Rn·Og. 최외각 전자 완전 충전 → 반응성 극히 낮음. 조명·레이저·냉각제."
};

const ELEMENTS = [
  // Z, sym, nameKo, nameEn, mass, cat, period, group, config, state, year, en, desc
  [1,"H","수소","Hydrogen","1.008","nonmetal",1,1,"1s¹","기체",1766,2.20,"우주에서 가장 풍부한 원소. 태양과 별의 핵융합 연료. 연료전지·암모니아 합성 등 산업적으로 중요. 물(H₂O)의 구성 요소."],
  [2,"He","헬륨","Helium","4.003","noble",1,18,"1s²","기체",1868,null,"비활성 기체 중 가장 가벼움. 풍선·비행선·극저온 냉각제(MRI)에 사용. 우주에서 두 번째로 풍부한 원소."],

const CAT_NAMES = {
  alkali:'알칼리 금속', alkaline:'알칼리 토금속', transition:'전이 금속',
  posttrans:'전이후 금속', metalloid:'준금속', nonmetal:'비금속',
  halogen:'할로겐', noble:'비활성 기체', lanthanide:'란타넘족', actinide:'악티늄족', unknown:'미분류'
};

const STATE_MAP = { '기체':'⛅ 기체', '액체':'💧 액체', '고체':'🪨 고체' };

function buildTable() {
  const grid = document.getElementById('pt-grid');
  const elMap = {};
  ELEMENTS.forEach(e => elMap[e[0]] = e);

  // Group header row (row 1)
  const gapCell = document.createElement('div');
  grid.appendChild(gapCell);
  for (let g = 1; g <= 18; g++) {
    const cell = document.createElement('div');
    cell.className = 'group-label';
    cell.innerHTML = g + (g===1||g===2||g>=13 ? `<span>${['IA','IIA','','','','','','','','','','','IIIA','IVA','VA','VIA','VIIA','0'][g===1?0:g===2?1:g-13+12]}</span>` : '');
    grid.appendChild(cell);
  }

  // Rows 2..8 (periods 1..7) + gap row + rows 10..11 (La/Ac series)
  for (let row = 2; row <= 11; row++) {
    if (row === 9) {
      // gap row
      for (let c = 0; c <= 18; c++) {
        const d = document.createElement('div');
        d.className = 'gap-row';
        grid.appendChild(d);
      }
      continue;
    }

    const period = row <= 8 ? row - 1 : (row === 10 ? 6 : 7);

    // Row label
    const rl = document.createElement('div');
    rl.className = 'period-label';
    if (row <= 8) rl.textContent = period;
    else rl.textContent = row === 10 ? 'La' : 'Ac';
    grid.appendChild(rl);

    for (let col = 1; col <= 18; col++) {
      // Find element at this row/col
      let found = null;
      for (const [z, r, c] of layout) {
        if (r === row && c - 1 === col) { found = z; break; }
      }

      const cell = document.createElement('div');

      if (found && elMap[found]) {
        const el = elMap[found];
        const [z, sym, nameKo, nameEn, mass, cat, p, g] = el;
        cell.className = `el cat-${cat}`;
        cell.dataset.z = z;
        cell.dataset.period = p;
        cell.dataset.group = g;
        cell.innerHTML = `
          <div class="el-num">${z}</div>
          <div class="el-sym">${sym}</div>
          <div class="el-name">${nameKo}</div>
          <div class="el-mass">${mass}</div>
        `;
        cell.addEventListener('mouseenter', () => hoverElement(z, p, g));
        cell.addEventListener('mouseleave', clearHover);
        cell.addEventListener('click', () => openModal(z));

        // Placeholder for La/Ac row markers in main grid
        if ((row === 7 && col === 3 && (found === 57 || found === 89)) ||
            (row === 8 && col === 3)) {
          // fine
        }
      } else if (row <= 8 && (col === 3) && (row === 7 || row === 8)) {
        cell.className = 'placeholder';
        cell.textContent = row === 7 ? '57-71' : '89-103';
      } else {
        cell.className = 'placeholder';
      }
      grid.appendChild(cell);
    }
  }
}

let hoverTimeout;
function hoverElement(z, period, group) {
  clearTimeout(hoverTimeout);
  // Highlight period and group
  document.querySelectorAll('.el').forEach(e => {
    e.classList.remove('period-hl', 'group-hl');
    if (parseInt(e.dataset.period) === period) e.classList.add('period-hl');
    if (parseInt(e.dataset.group) === group) e.classList.add('group-hl');
  });

  const pc = document.getElementById('period-info');
  const gc = document.getElementById('group-info');
  pc.classList.add('active');
  gc.classList.add('active');
  document.getElementById('period-text').textContent = PERIODS[period] || '';
  document.getElementById('group-text').textContent = GROUPS[group] || `${group}족`;
}

function clearHover() {
  hoverTimeout = setTimeout(() => {
    document.querySelectorAll('.el').forEach(e => e.classList.remove('period-hl', 'group-hl'));
    document.getElementById('period-info').classList.remove('active');
    document.getElementById('group-info').classList.remove('active');
    document.getElementById('period-text').textContent = '원소 위에 마우스를 올리면 주기 특징이 표시됩니다.';
    document.getElementById('group-text').textContent = '원소를 클릭하거나 호버하면 족 특징이 표시됩니다.';
  }, 200);
}

function openModal(z) {
  const el = ELEMENTS.find(e => e[0] === z);
  if (!el) return;
  const [num, sym, nameKo, nameEn, mass, cat, period, group, config, state, year, en, desc] = el;

  const catColor = getComputedStyle(document.documentElement).getPropertyValue(`--${cat}`).trim();
  document.getElementById('m-num').textContent = num;
  document.getElementById('m-sym').textContent = sym;
  document.getElementById('m-sym').style.color = catColor;
  document.getElementById('m-name-ko').textContent = nameKo;
  document.getElementById('m-name').textContent = nameKo;
  document.getElementById('m-name-en').textContent = nameEn;
  document.getElementById('m-cat').textContent = CAT_NAMES[cat] || cat;
  document.getElementById('m-cat').style.color = catColor;
  document.getElementById('m-mass').textContent = mass;
  document.getElementById('m-config').textContent = config;
  document.getElementById('m-pg').textContent = `${period}주기 / ${group}족`;
  document.getElementById('m-state').textContent = STATE_MAP[state] || state;
  document.getElementById('m-year').textContent = year === '고대' ? '고대' : `${year}년`;
  document.getElementById('m-en').textContent = en ? en.toString() : '—';
  document.getElementById('m-desc').textContent = desc;

  const wikiUrl = `https://en.wikipedia.org/wiki/${encodeURIComponent(nameEn)}`;
  const namuUrl = `https://namu.wiki/w/${encodeURIComponent(nameKo)}`;
  document.getElementById('m-wiki').href = wikiUrl;
  document.getElementById('m-namu').href = namuUrl;

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

function closeModalBtn() {
  document.getElementById('modal-overlay').classList.remove('open');
}

buildTable();

// ── Legend: 원소 버튼과 동일한 방식으로 JS에서 생성 + addEventListener 직접 부착 ──
const LEGEND_DATA = [
  { cat: 'alkali',     label: '알칼리 금속',  wiki: 'Alkali_metal',         namu: '알칼리 금속' },
  { cat: 'alkaline',   label: '알칼리 토금속', wiki: 'Alkaline_earth_metal',  namu: '알칼리 토금속' },
  { cat: 'transition', label: '전이 금속',    wiki: 'Transition_metal',      namu: '전이금속' },
  { cat: 'posttrans',  label: '전이후 금속',  wiki: 'Post-transition_metal', namu: '전이후 금속' },
  { cat: 'metalloid',  label: '준금속',       wiki: 'Metalloid',             namu: '준금속' },
  { cat: 'nonmetal',   label: '비금속',       wiki: 'Nonmetal',              namu: '비금속' },
  { cat: 'halogen',    label: '할로겐',       wiki: 'Halogen',               namu: '할로젠' },
  { cat: 'noble',      label: '비활성 기체',  wiki: 'Noble_gas',             namu: '비활성 기체' },
  { cat: 'lanthanide', label: '란타넘족',     wiki: 'Lanthanide',            namu: '란타넘족' },
  { cat: 'actinide',   label: '악티늄족',     wiki: 'Actinide',              namu: '악티늄족' },
];

const legendContainer = document.getElementById('legend');

LEGEND_DATA.forEach(({ cat, label, wiki, namu }) => {
  // 색상 읽기
  const color = getComputedStyle(document.documentElement).getPropertyValue(`--${cat}`).trim();

  // 버튼 div 생성
  const item = document.createElement('div');
  item.className = 'legend-item';

  // 색 점
  const dot = document.createElement('div');
  dot.className = 'legend-dot';
  dot.style.background = color;

  // 텍스트
  const text = document.createElement('span');
  text.textContent = label;

  item.appendChild(dot);
  item.appendChild(text);
  legendContainer.appendChild(item);

  // 클릭 이벤트 — 원소 버튼과 동일한 방식
  item.addEventListener('click', function(e) {
    e.stopPropagation();
    openLegendModal(label, wiki, namu, color);
  });
});

// 범주 링크 모달
const legendModal = document.createElement('div');
legendModal.id = 'legend-modal';
legendModal.style.cssText = `
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.75); backdrop-filter:blur(6px);
  z-index:2000; align-items:center; justify-content:center; padding:20px;
`;
legendModal.innerHTML = `
  <div style="
    background:#111827; border:1px solid #1e2d3d; border-radius:16px;
    padding:28px; width:100%; max-width:320px; position:relative;
    animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  ">
    <button id="legend-modal-close" style="
      position:absolute; top:14px; right:14px;
      width:28px; height:28px; border-radius:50%;
      border:1px solid #1e2d3d; background:none;
      color:#64748b; cursor:pointer; font-size:1rem;
      display:flex; align-items:center; justify-content:center;
    ">✕</button>
    <div id="lm-title" style="
      font-family:'Space Mono',monospace; font-size:1rem; font-weight:700;
      margin-bottom:20px; padding-bottom:12px; border-bottom:1px solid #1e2d3d;
    "></div>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <a id="lm-wiki" href="#" target="_blank" style="
        display:flex; align-items:center; gap:10px;
        padding:12px 16px; border-radius:8px;
        border:1px solid rgba(56,189,248,0.3);
        background:rgba(255,255,255,0.03);
        color:#e2e8f0; text-decoration:none;
        font-size:0.85rem; font-weight:600;
      ">🌐 Wikipedia</a>
      <a id="lm-namu" href="#" target="_blank" style="
        display:flex; align-items:center; gap:10px;
        padding:12px 16px; border-radius:8px;
        border:1px solid rgba(129,140,248,0.3);
        background:rgba(255,255,255,0.03);
        color:#e2e8f0; text-decoration:none;
        font-size:0.85rem; font-weight:600;
      ">🌿 나무위키</a>
    </div>
  </div>
`;
document.body.appendChild(legendModal);

document.getElementById('legend-modal-close').addEventListener('click', closeLegendModal);
legendModal.addEventListener('click', function(e) {
  if (e.target === legendModal) closeLegendModal();
});

function openLegendModal(label, wiki, namu, color) {
  document.getElementById('lm-title').textContent = label;
  document.getElementById('lm-title').style.color = color;
  document.getElementById('lm-wiki').href = `https://en.wikipedia.org/wiki/${encodeURIComponent(wiki)}`;
  document.getElementById('lm-namu').href = `https://namu.wiki/w/${encodeURIComponent(namu)}`;
  legendModal.style.display = 'flex';
}

function closeLegendModal() {
  legendModal.style.display = 'none';
}
</script>
</body>
